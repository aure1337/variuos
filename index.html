<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS Checker - Free Working Configs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .configs-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .config-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .config-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .config-item.working {
            border-left-color: #28a745;
        }

        .config-item.failed {
            border-left-color: #dc3545;
            opacity: 0.6;
        }

        .config-info {
            flex: 1;
        }

        .config-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .config-details {
            color: #666;
            font-size: 0.9em;
        }

        .config-url {
            font-family: monospace;
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
            word-break: break-all;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-right: 10px;
        }

        .status-badge.working {
            background: #28a745;
            color: white;
        }

        .status-badge.failed {
            background: #dc3545;
            color: white;
        }

        .status-badge.checking {
            background: #ffc107;
            color: black;
        }

        .copy-btn {
            padding: 8px 15px;
            font-size: 0.9em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .last-updated {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-style: italic;
        }

        .filter-buttons {
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 20px;
            margin-right: 10px;
            background: #e9ecef;
            color: #333;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 VLESS Checker</h1>
            <p class="subtitle">Free Working VLESS Configs - Updated Automatically</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Configs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="workingCount" style="color: #28a745;">0</div>
                <div class="stat-label">Working</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="failedCount" style="color: #dc3545;">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="successRate">0%</div>
                <div class="stat-label">Success Rate</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="checkConfigs()" id="checkBtn">🔍 Check All Configs</button>
            <button onclick="copyAllWorking()">📋 Copy All Working</button>
            <button onclick="exportWorking()">💾 Export Working</button>
            <button onclick="loadConfigs()">🔄 Refresh</button>
        </div>

        <div class="configs-container">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterConfigs('all')">All</button>
                <button class="filter-btn" onclick="filterConfigs('working')">Working Only</button>
                <button class="filter-btn" onclick="filterConfigs('failed')">Failed Only</button>
            </div>
            <div id="configsList">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading configs...
                </div>
            </div>
            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </div>

    <script>
        let allConfigs = [];
        let currentFilter = 'all';

        // Загрузка конфигов при старте
        window.onload = () => {
            loadConfigs();
        };

        async function loadConfigs() {
            try {
                const response = await fetch('results.json');
                const data = await response.json();

                allConfigs = [
                    ...data.working_configs.map(url => ({ url, status: 'working' })),
                    ...data.failed_configs.map(url => ({ url, status: 'failed' }))
                ];

                updateStats(data);
                displayConfigs();

                if (data.checked_at) {
                    document.getElementById('lastUpdated').textContent =
                        `Last updated: ${new Date(data.checked_at).toLocaleString()}`;
                }
            } catch (error) {
                document.getElementById('configsList').innerHTML =
                    '<div class="loading">❌ Error loading configs. Run checker first!</div>';
            }
        }

        function updateStats(data) {
            document.getElementById('totalCount').textContent = data.total;
            document.getElementById('workingCount').textContent = data.working;
            document.getElementById('failedCount').textContent = data.failed;

            const rate = data.total > 0 ? Math.round((data.working / data.total) * 100) : 0;
            document.getElementById('successRate').textContent = rate + '%';
        }

        function displayConfigs() {
            const configsList = document.getElementById('configsList');

            let filtered = allConfigs;
            if (currentFilter === 'working') {
                filtered = allConfigs.filter(c => c.status === 'working');
            } else if (currentFilter === 'failed') {
                filtered = allConfigs.filter(c => c.status === 'failed');
            }

            if (filtered.length === 0) {
                configsList.innerHTML = '<div class="loading">No configs found</div>';
                return;
            }

            configsList.innerHTML = filtered.map((config, index) => {
                const parsed = parseVlessUrl(config.url);
                return `
                    <div class="config-item ${config.status}">
                        <div class="config-info">
                            <div class="config-name">${parsed.name || 'Unknown'}</div>
                            <div class="config-details">
                                ${parsed.address}:${parsed.port} | ${parsed.network.toUpperCase()} | ${parsed.tls ? '🔒 TLS' : '🔓 No TLS'}
                            </div>
                            <div class="config-url">${config.url.substring(0, 80)}...</div>
                        </div>
                        <div>
                            <span class="status-badge ${config.status}">${config.status === 'working' ? '✅ Working' : '❌ Failed'}</span>
                            ${config.status === 'working' ? `<button class="copy-btn" onclick="copyConfig('${config.url.replace(/'/g, "\\'")}')">Copy</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function parseVlessUrl(url) {
            try {
                const urlObj = new URL(url);
                const params = Object.fromEntries(urlObj.searchParams);
                return {
                    name: decodeURIComponent(urlObj.hash.slice(1)) || urlObj.hostname,
                    address: urlObj.hostname,
                    port: urlObj.port || 443,
                    network: params.type || 'tcp',
                    tls: params.security === 'tls' || params.security === 'reality'
                };
            } catch {
                return { name: 'Invalid', address: 'unknown', port: 0, network: 'unknown', tls: false };
            }
        }

        function copyConfig(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ Config copied to clipboard!');
            });
        }

        function copyAllWorking() {
            const working = allConfigs.filter(c => c.status === 'working').map(c => c.url).join('\n');
            if (working) {
                navigator.clipboard.writeText(working).then(() => {
                    alert(`✅ Copied ${allConfigs.filter(c => c.status === 'working').length} working configs!`);
                });
            } else {
                alert('❌ No working configs to copy');
            }
        }

        function exportWorking() {
            const working = allConfigs.filter(c => c.status === 'working').map(c => c.url).join('\n');
            const blob = new Blob([working], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'working-vless-configs.txt';
            a.click();
        }

        function filterConfigs(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayConfigs();
        }

        async function checkConfigs() {
            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Checking...';

            alert('Run "npm run check" in terminal to check configs');

            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '🔍 Check All Configs';
            }, 2000);
        }
    </script>
</body>
</html>
